# Auto-deploy: every push to main SSHes into the production server and rebuilds.
name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pinned host key: refuse to connect to anything but our server.
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          # The key is bound to a forced command on the server
          # (/usr/local/sbin/deploy-royaledecklab), so the word "deploy" here
          # is ignored; the server always runs exactly that script.
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            root@"$HOST" deploy

      - name: Smoke test
        run: |
          sleep 10
          curl -fsS https://royaledecklab.com/healthz
