services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      TRUST_PROXY_HEADERS: "true"
    volumes:
      - meta:/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  meta:
  caddy_data:
  caddy_config:
